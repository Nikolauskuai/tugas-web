<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Mahasiswa - Inline CSS</title>
</head>
<body style="margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #7ec8e3 0%, #2d3e50 100%); font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:#ffffff;">
    <section style="width:100%; max-width:560px; margin:24px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18); border-radius:24px; box-shadow:0 20px 40px rgba(0,0,0,0.25); padding:32px; text-align:center;">
        <img src="images/profile.jpg" alt="Foto profil" width="180" style="border-radius:50%; border:4px solid rgba(255,255,255,0.35); margin-bottom:24px; object-fit:cover;">
        <h1 style="font-size:2rem; margin-bottom:12px; letter-spacing:0.02em;">Niko Laus</h1>
        <p style="margin:0 auto 24px; max-width:440px; color:#d9e6f2; font-size:1rem;">Mahasiswa semester 4 Program Studi Teknik Komputer, asal Kalimantan Timur, dengan hobi bermain badminton.</p>

        <div style="display:grid; gap:16px; text-align:left;">
            <div style="background:rgba(255,255,255,0.08); padding:18px 20px; border-radius:16px; border:1px solid rgba(255,255,255,0.14);">
                <strong style="display:block; margin-bottom:8px; color:#a8d0ff;">Nama Mahasiswa</strong>
                Niko Laus
            </div>
            <div style="background:rgba(255,255,255,0.08); padding:18px 20px; border-radius:16px; border:1px solid rgba(255,255,255,0.14);">
                <strong style="display:block; margin-bottom:8px; color:#a8d0ff;">NIM</strong>
                241110056
            </div>
            <div style="background:rgba(255,255,255,0.08); padding:18px 20px; border-radius:16px; border:1px solid rgba(255,255,255,0.14);">
                <strong style="display:block; margin-bottom:8px; color:#a8d0ff;">Semester</strong>
                4
            </div>
            <div style="background:rgba(255,255,255,0.08); padding:18px 20px; border-radius:16px; border:1px solid rgba(255,255,255,0.14);">
                <strong style="display:block; margin-bottom:8px; color:#a8d0ff;">Hobi</strong>
                 Bermain batminton 
            </div>
            <div style="background:rgba(255,255,255,0.08); padding:18px 20px; border-radius:16px; border:1px solid rgba(255,255,255,0.14);">
                <strong style="display:block; margin-bottom:8px; color:#a8d0ff;">Asal</strong>
                Kalimantan Timur
            </div>
        </div>
    </section>
</body>
</html>
